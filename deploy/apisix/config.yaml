# APISIX 主配置 — standalone 模式 + Prometheus
apisix:
  enable_control: true
  node_listen: 9080
  enable_admin: true
  enable_admin_cors: true
  enable_heartbeat: false

  # Prometheus 指标导出
  prometheus:
    export_addr:
      ip: "0.0.0.0"
      port: 9092

deployment:
  admin:
    admin_key:
      - name: admin
        key: edd1c9f034335f136f87ad84b625c8f1
        role: admin
    allow_admin:
      - 0.0.0.0/0

  # Standalone 模式 — 从 apisix.yaml 读取路由，不依赖 etcd
  role: data_plane
  role_data_plane:
    config_provider: yaml

plugin_attr:
  prometheus:
    export_uri: /metrics
    enable_export_server: true
  limit-count:
    policy: redis
    redis_host: redis
    redis_port: 6379
    redis_database: 1
