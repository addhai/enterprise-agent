{{/* =============================================================================
  Secrets — Enterprise Agent 敏感配置
  在生产环境中，这些值应由外部 Secret Manager 注入（如 Sealed Secrets）
  ============================================================================= */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | default "CHANGE_ME" | quote }}
  OPENAI_API_BASE: {{ .Values.secrets.openaiApiBase | default "https://dashscope.aliyuncs.com/compatible-mode/v1" | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:%s/%s" (.Values.externalServices.postgres.user | default "postgres") (.Values.externalServices.postgres.password | default "postgres") .Values.externalServices.postgres.host (.Values.externalServices.postgres.port | default 5432 | toString) (.Values.externalServices.postgres.database | default "agent") | quote }}
  REDIS_URL: {{ printf "redis://%s:%s" .Values.externalServices.redis.host (.Values.externalServices.redis.port | default 6379 | toString) | quote }}
  MINIO_ACCESS_KEY: {{ .Values.externalServices.minio.accessKey | default "minioadmin" | quote }}
  MINIO_SECRET_KEY: {{ .Values.externalServices.minio.secretKey | default "minioadmin" | quote }}
  RABBITMQ_URL: {{ printf "amqp://%s:%s@%s:%s" (.Values.externalServices.rabbitmq.user | default "agent") (.Values.externalServices.rabbitmq.password | default "agent") .Values.externalServices.rabbitmq.host (.Values.externalServices.rabbitmq.port | default 5672 | toString) | quote }}
  LANGSMITH_API_KEY: {{ .Values.secrets.langsmithApiKey | default "" | quote }}
