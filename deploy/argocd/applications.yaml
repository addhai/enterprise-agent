# ArgoCD Application — Enterprise Agent (Staging)
# 安装: kubectl apply -f deploy/argocd/application-staging.yaml
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-staging
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: ${GIT_REPO_URL}              # 替换为实际仓库 URL
    targetRevision: main
    path: deploy/helm/enterprise-agent
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-production
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: ${GIT_REPO_URL}
    targetRevision: main
    path: deploy/helm/enterprise-agent
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-prod
  syncPolicy:
    # 生产环境不自动同步 — 由 GitLab CI 手动触发
    automated: {}
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
