services:
  # ============================================================
  # Chatwoot（多渠道客服管理平台）
  # ============================================================
  chatwoot:
    image: mirror.gcr.io/chatwoot/chatwoot:v3.9.0
    ports:
      - "3000:3000"
    environment:
      - SECRET_KEY_BASE=${CHATWOOT_SECRET_KEY:-default-secret-key-change-in-production}
      - FRONTEND_URL=http://localhost:3000
      - INSTALLATION_ENV=docker
      - PUBLIC_API_BASE_URL=http://fastapi:8000
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/chatwoot
    depends_on:
      - redis
      - postgres
    volumes:
      - chatwoot_data:/var/www/chatwoot/storage
    restart: unless-stopped

  # ============================================================
  # 后端服务（FastAPI + LangGraph Agent）
  # ============================================================
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=https://dashscope.aliyuncs.com/compatible-mode/v1
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/agent
      - LANGSMITH_TRACING=false
      - CHROMA_PERSIST_DIR=/app/chroma_data
    depends_on:
      - redis
      - postgres
    volumes:
      - ./data:/app/data
      - chroma_data:/app/chroma_data
    restart: unless-stopped

  # ============================================================
  # 数据库（PostgreSQL）
  # ============================================================
  postgres:
    image: mirror.gcr.io/library/postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=agent
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ============================================================
  # 缓存（Redis）
  # ============================================================
  redis:
    image: mirror.gcr.io/library/redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ============================================================
  # 前端（React SPA + Nginx 反向代理）
  # ============================================================
  web:
    image: mirror.gcr.io/library/nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html:ro
    depends_on:
      - fastapi
    restart: unless-stopped

volumes:
  pg_data:
  chroma_data:
  chatwoot_data:
